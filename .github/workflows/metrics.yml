name: Update GitHub Metrics

on:
  schedule:
    # Запуск каждый день в полночь UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Карточка «в цифрах»: коммиты, активность, календарь.
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: RoXyGeNOFF
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories
          config_timezone: Europe/Moscow
          config_display: large
          # У lowlighter/metrics НЕТ опции темы (проверено: 335 параметров,
          # ни одного со словом theme). Тёмный вид — только своим CSS.
          extras_css: |
            svg, body, .base, foreignObject > div { background: #0D1117 !important; }
            * { color: #C9D1D9 !important; border-color: #30363D !important; }
            h2, .title, a { color: #3FB950 !important; }
            .field svg, .octicon { fill: #8B949E !important; }
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Языки — отдельной карточкой, иначе одна огромная простыня.
      - name: Generate languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: RoXyGeNOFF
          filename: assets/metrics-languages.svg
          base: header
          config_timezone: Europe/Moscow
          # У lowlighter/metrics НЕТ опции темы (проверено: 335 параметров,
          # ни одного со словом theme). Тёмный вид — только своим CSS.
          extras_css: |
            svg, body, .base, foreignObject > div { background: #0D1117 !important; }
            * { color: #C9D1D9 !important; border-color: #30363D !important; }
            h2, .title, a { color: #3FB950 !important; }
            .field svg, .octicon { fill: #8B949E !important; }
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

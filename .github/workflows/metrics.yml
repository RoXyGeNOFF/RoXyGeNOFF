name: Update GitHub Metrics

on:
  schedule:
    # Запуск каждый день в полночь UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Карточка «в цифрах»: коммиты, активность, календарь.
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: RoXyGeNOFF
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories
          config_timezone: Europe/Moscow
          config_display: large
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Языки — отдельной карточкой, иначе одна огромная простыня.
      - name: Generate languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: RoXyGeNOFF
          filename: assets/metrics-languages.svg
          base: ""
          config_timezone: Europe/Moscow
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/metrics.svg assets/metrics-languages.svg
          git diff --staged --quiet || git commit -m "Update GitHub metrics [skip ci]"
          git push

